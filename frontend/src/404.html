<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Graphify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    // Single Page Apps for GitHub Pages
    // MIT Licensed
    // This script takes the current URL and converts the path and query
    // string into just a query string, and then redirects the browser
    // to the new URL with only a query string and hash fragment.
    var pathSegmentsToKeep = 1; // Keeps /Graphify/ in the path
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
  <style>
    /* Minimal styling for redirect page */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #f9fafb;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .redirect-container {
      text-align: center;
      padding: 2rem;
    }
    .redirect-text {
      font-size: 1.25rem;
      color: #2a70e0;
      margin-bottom: 0.5rem;
    }
    .loading-spinner {
      border: 4px solid rgba(42, 112, 224, 0.1);
      border-radius: 50%;
      border-top: 4px solid #2a70e0;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="redirect-container">
    <div class="loading-spinner"></div>
    <p class="redirect-text">Redirecting to Graphify...</p>
  </div>
</body>
</html>
