<!-- Main application layout using Tailwind CSS -->
<div class="min-h-screen flex flex-col bg-gray-50">
  <!-- Header/Navigation with improved styling and GitHub icon -->
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center">
        <!-- Simple GitHub-like graph icon using SVG -->
        <svg class="w-8 h-8 mr-2 text-primary" fill="currentColor" viewBox="0 0 24 24">
          <path d="M1.5 1.5H5.25V5.25H1.5V1.5ZM6.75 1.5H10.5V5.25H6.75V1.5ZM12 1.5H15.75V5.25H12V1.5ZM17.25 1.5H21V5.25H17.25V1.5ZM1.5 6.75H5.25V10.5H1.5V6.75ZM12 6.75H15.75V10.5H12V6.75ZM17.25 6.75H21V10.5H17.25V6.75ZM1.5 12H5.25V15.75H1.5V12ZM6.75 12H10.5V15.75H6.75V12ZM12 12H15.75V15.75H12V12ZM17.25 12H21V15.75H17.25V12ZM1.5 17.25H5.25V21H1.5V17.25ZM6.75 17.25H10.5V21H6.75V17.25ZM12 17.25H15.75V21H12V17.25ZM17.25 17.25H21V21H17.25V17.25Z"/>
        </svg>
        <h1 class="text-2xl font-bold text-primary">Graphify</h1>
      </div>
      <!-- Responsive navigation -->
      <nav>
        <ul class="hidden md:flex space-x-8">
          <li><a href="#/" class="text-gray-600 hover:text-primary transition-colors">Home</a></li>
          <li><a href="#/patterns" class="text-gray-600 hover:text-primary transition-colors">Patterns</a></li>
          <li><a href="#/schedules" class="text-gray-600 hover:text-primary transition-colors">Schedules</a></li>
          <li><a href="#/profile" class="text-gray-600 hover:text-primary transition-colors">Profile</a></li>
        </ul>
        <!-- Mobile menu button -->
        <button class="md:hidden text-gray-500 hover:text-primary">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- Main Content with subtle background pattern -->
  <main class="flex-grow relative">
    <!-- SVG background pattern for visual interest -->
    <div class="absolute inset-0 z-0 opacity-5">
      <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
        <pattern id="pattern-grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <rect x="0" y="0" width="2" height="2" fill="currentColor" />
        </pattern>
        <rect x="0" y="0" width="100%" height="100%" fill="url(#pattern-grid)" />
      </svg>
    </div>
    <div class="relative z-1">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Footer with improved links -->
  <footer class="bg-white py-6 border-t border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center">
      <p class="text-gray-500 mb-4 md:mb-0">© 2025 Graphify | Created by <a href="https://github.com/iiXXiXii" target="_blank" class="text-primary hover:underline">iiXXiXii</a></p>
      <div class="flex space-x-6">
        <a href="https://github.com/iiXXiXii/Graphify" target="_blank" class="text-gray-500 hover:text-primary">
          <span class="sr-only">GitHub</span>
          <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
            <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
          </svg>
        </a>
      </div>
    </div>
  </footer>
</div>
