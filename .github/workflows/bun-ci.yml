name: Bun CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build frontend
      run: bun run --cwd frontend build

    - name: Build backend
      run: bun run --cwd backend build

    - name: Build CLI
      run: bun run --cwd graphify-cli build

    - name: Run tests
      run: bun test
