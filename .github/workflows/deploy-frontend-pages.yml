name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-pages.yml'
  workflow_dispatch:  # Allows manual triggering

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Angular app
        # Note: You may need to add --base-href="/repo-name/" if this is a project page
        # For user pages (username.github.io), the base-href should be "/"
        run: |
          cd frontend
          bunx ng build --configuration production
        # If you encounter issues with bunx, try:
        # cd frontend && bun x ng build --configuration production

      - name: Check build output structure
        run: ls -la frontend/dist/frontend/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # For SSR apps, the browser files go to /browser subdirectory
          path: ./frontend/dist/frontend/browser/
          # For non-SSR Angular apps, use: ./frontend/dist/frontend/

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
